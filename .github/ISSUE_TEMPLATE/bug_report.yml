name: Bug report
description: Report a defect, crash, or unexpected behavior in convertr
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search existing
        issues before opening a new one — duplicates slow everyone down.

  - type: input
    id: version
    attributes:
      label: convertr version
      description: Output of `convertr version`
      placeholder: "0.1.0 (commit abc1234, built 2026-05-01)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: input_format
    attributes:
      label: Input format
      description: Source file format (e.g. docx, mp4, jpg)
      placeholder: "docx"
    validations:
      required: true

  - type: input
    id: output_format
    attributes:
      label: Output format
      description: Target file format (e.g. pdf, gif, webp)
      placeholder: "pdf"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact convertr command that triggered the issue
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste error output verbatim.
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: convertr doctor output
      description: Paste the full output of `convertr doctor` — it catches most environment issues before we ask.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, recent upgrades, backend versions, …
